name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  discover:
    name: Discover architectures
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build architecture matrix from upstream release assets
        id: set-matrix
        run: |
          set -e
          VERSION="$(sh scripts/latest-fancontrol-release.sh shizzz/openwrt-fancontrol)"
          API="https://api.github.com/repos/shizzz/openwrt-fancontrol/releases/tags/v${VERSION}"
          ASSETS="$(curl -fsSL "$API" | jq -r '.assets[].name' | grep '^openwrt-fancontrol-linux-.*\.tar\.gz$' || true)"

          if [ -z "$ASSETS" ]; then
            echo "No release assets found for openwrt-fancontrol v${VERSION}" >&2
            exit 1
          fi

          JSON='{"include":[]}'
          for asset in $ASSETS; do
            suffix="${asset#openwrt-fancontrol-linux-}"
            suffix="${suffix%.tar.gz}"
            sdk_arch="$(sh scripts/sdk-arch-for-asset.sh "$suffix")"
            JSON="$(printf '%s' "$JSON" | jq -c --arg sdk "${sdk_arch}-openwrt-24.10" --arg label "$suffix" \
              '.include += [{"sdk": $sdk, "label": $label}]')"
          done

          echo "matrix=${JSON}" >> "$GITHUB_OUTPUT"
          echo "Discovered matrix: ${JSON}"

  build:
    name: ${{ matrix.label }} (${{ matrix.sdk }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.sdk }}
          PACKAGES: fancontrol luci-app-fancontrol

      - name: Verify packages were built
        run: |
          set -e
          ipk_count="$(find bin/packages -name '*.ipk' 2>/dev/null | wc -l | tr -d ' ')"
          apk_count="$(find bin/packages -name '*.apk' 2>/dev/null | wc -l | tr -d ' ')"
          echo "Built ${ipk_count} ipk and ${apk_count} apk file(s)"
          if [ "$ipk_count" -eq 0 ] && [ "$apk_count" -eq 0 ]; then
            echo "No packages were produced" >&2
            exit 1
          fi
          find bin/packages \( -name '*.ipk' -o -name '*.apk' \) -ls

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-ipk
          path: bin/packages/**/packages/*.ipk
          if-no-files-found: error

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-apk
          path: bin/packages/**/packages/*.apk
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
